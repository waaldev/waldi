services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: waldi
      POSTGRES_PASSWORD: waldi
      POSTGRES_DB: waldi
    ports:
      - "5432:5432"
    volumes:
      - waldi-postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: waldi
      MINIO_ROOT_PASSWORD: waldi-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - waldi-minio-data:/data

volumes:
  waldi-postgres-data:
  waldi-minio-data:
