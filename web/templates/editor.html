{{define "editor.html"}}
{{template "layout-start" .}}
<header class="editor-bar">
  <div class="left">
    <a href="/write">← {{.T "editor.drafts"}}</a>
  </div>
  <div class="right">
    <p class="save-status" data-editor-status></p>
    {{if eq .Write.Post.Status "published"}}
      <button class="btn-publish" type="submit" form="draft-form">{{.T "editor.to_draft"}}</button>
    {{else}}
      <button class="btn-publish" type="submit" form="publish-form">{{.T "editor.publish"}}</button>
    {{end}}
    {{template "theme-toggle" .}}
  </div>
</header>

<section data-editor-root
  data-lang="{{.Write.Post.Lang}}"
  data-dir="{{.Write.Post.Dir}}"
  data-page-lang="{{.Lang}}"
  data-ui-saving="{{.T "editor.status.saving"}}"
  data-ui-saved="{{.T "editor.status.saved"}}"
  data-ui-error="{{.T "editor.status.error"}}"
  data-ui-link-prompt="{{.T "editor.link.prompt"}}"
  data-ui-footnote-prompt="{{.T "editor.footnote.prompt"}}"
  data-ui-embed-prompt="{{.T "editor.embed.prompt"}}"
  data-ui-embed-invalid="{{.T "editor.embed.invalid"}}"
  data-ui-words="{{.T "editor.words"}}">
  <form data-editor-form data-save-url="/api/drafts/{{.Write.Post.ID}}">
    <input class="editor-title" name="title" value="{{.Write.Post.Title}}" placeholder="{{.T "editor.title.placeholder"}}" data-editor-title>

    <div class="editor-canvas" data-editor-canvas>
      <div class="editor-mount prose" data-editor-mount></div>

      <div class="bubble-menu" role="toolbar" aria-label="{{.T "editor.toolbar.aria"}}" data-bubble-menu>
        <button type="button" data-command="bold" aria-label="{{.T "editor.toolbar.bold"}}"><strong>B</strong></button>
        <button type="button" data-command="italic" aria-label="{{.T "editor.toolbar.italic"}}"><em>i</em></button>
        <button type="button" data-command="heading" aria-label="{{.T "editor.toolbar.heading"}}">H2</button>
        <button type="button" data-command="quote" aria-label="{{.T "editor.toolbar.quote"}}">„”</button>
        <button type="button" data-command="aside" aria-label="{{.T "editor.toolbar.aside"}}">N.B.</button>
        <button type="button" data-command="bullet-list" aria-label="{{.T "editor.toolbar.bullet_list"}}">•</button>
        <button type="button" data-command="ordered-list" aria-label="{{.T "editor.toolbar.ordered_list"}}">1.</button>
        <button type="button" data-command="link" aria-label="{{.T "editor.toolbar.link"}}">↗</button>
        <button type="button" data-command="footnote" aria-label="{{.T "editor.toolbar.footnote"}}">¹</button>
        <button type="button" data-command="ltr" aria-label="{{.T "editor.toolbar.ltr"}}">LTR</button>
        <button type="button" data-command="rtl" aria-label="{{.T "editor.toolbar.rtl"}}">RTL</button>
      </div>

      <div class="image-menu" role="toolbar" aria-label="{{.T "editor.toolbar.image_aria"}}" data-image-menu>
        <button type="button" data-command="delete-image">{{.T "editor.toolbar.remove_image"}}</button>
      </div>

      <div class="image-menu" role="toolbar" aria-label="{{.T "editor.toolbar.embed_aria"}}" data-embed-menu>
        <button type="button" data-command="delete-embed">{{.T "editor.toolbar.remove_embed"}}</button>
      </div>

      <div class="plus-control" data-plus-control>
        <button type="button" class="plus-button" aria-label="{{.T "editor.toolbar.aria"}}" data-plus-button>+</button>
        <div class="plus-menu" data-plus-menu>
          <button type="button" data-command="image">{{.T "editor.toolbar.image"}}</button>
          <button type="button" data-command="embed">{{.T "editor.toolbar.embed"}}</button>
          <button type="button" data-command="divider">{{.T "editor.toolbar.divider"}}</button>
        </div>
      </div>
    </div>

    <input class="image-input" type="file" accept="image/png,image/jpeg,image/gif,image/webp" data-editor-image>
    <script type="application/json" data-editor-doc-json>{{.Write.Post.DocJSON}}</script>
    <textarea class="doc-fallback" name="doc" dir="ltr" spellcheck="false" data-editor-doc aria-hidden="true"></textarea>
    <p class="word-count" data-editor-words></p>
  </form>

  {{if eq .Write.Post.Status "published"}}
    <form id="draft-form" method="post" action="/write/{{.Write.Post.ID}}/draft" data-draft-form></form>
  {{else}}
    <form id="publish-form" method="post" action="/write/{{.Write.Post.ID}}/publish" data-publish-form></form>
  {{end}}

  <footer class="editor-delete">
    <form method="post" action="/write/{{.Write.Post.ID}}/delete" onsubmit="return confirm('{{.T "editor.delete_confirm"}}')">
      <button class="quiet-danger" type="submit">{{if eq .Write.Post.Status "published"}}{{.T "editor.delete_post"}}{{else}}{{.T "editor.delete_draft"}}{{end}}</button>
    </form>
  </footer>
</section>
<script src="/static/js/editor.js" defer></script>
{{template "layout-end" .}}
{{end}}
